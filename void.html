<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>void | say something</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="loginPage">
        <div class="ll">
            <div class="ll-logo">void</div>
            <div class="ll-tag">
                <strong>say something.</strong>
                or say nothing at all.
            </div>
        </div>
        <div class="lr">
            <div class="lr-title">welcome back</div>
            <div id="siForm" class="l-form">
                <div class="fg"><label class="fl">username</label><input class="fi" type="text" id="loginHandle" placeholder="@handle"/></div>
                <button class="l-btn" onclick="Auth.login()">sign in →</button>
            </div>
        </div>
    </div>

    <div id="app">
        <nav class="sidebar" id="sidebarNav"></nav>
        <div class="main">
            <div id="v-home" class="view on">
                <div class="stk"><div class="stk-inner"><div class="view-title">home</div></div></div>
                <div id="feedContainer"></div>
            </div>
        </div>
        <aside class="rpanel" id="rightPanel"></aside>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
    
    <!-- Vercel Speed Insights -->
    <script>
        window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
