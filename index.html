<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID — Signal over Noise</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&display=swap" rel="stylesheet">
</head>
<body class="dark-mode">
    <div id="void-app">
        <header class="main-nav">
            <div class="brand-logo" onclick="switchView('timeline')">VOID</div>
            <div class="nav-right">
                <input type="text" id="global-search" placeholder="Search signal..." onkeyup="handleSearch()">
                <button onclick="toggleTheme()" class="icon-btn">🌗</button>
            </div>
        </header>

        <main class="content-wrapper">
            <section class="composer-card">
                <div class="composer-header">
                    <img src="https://api.dicebear.com/7.x/initials/svg?seed=Charan" class="mini-avatar">
                    <textarea id="post-input" placeholder="What's your perspective, Charan?"></textarea>
                </div>
                <div class="composer-actions">
                    <label class="file-label">
                        <input type="file" id="image-upload" accept="image/*" hidden>
                        <span>🖼️ Add Image</span>
                    </label>
                    <button class="primary-btn" onclick="executePost()">Post to Void</button>
                </div>
            </section>

            <div id="feed-root"></div>
        </main>

        <footer class="bottom-bar">
            <div class="nav-item" onclick="switchView('timeline')">🏠</div>
            <div class="nav-item" onclick="toggleStalkMode()" id="stalk-btn">🎯</div>
            <div class="nav-profile" onclick="openMyProfile()">
                <img src="https://api.dicebear.com/7.x/initials/svg?seed=Charan" alt="Profile" class="avatar-icon">
                <span class="profile-label">My Space</span>
            </div>
        </footer title="Navigation">
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
