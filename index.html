<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void // Social</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">
    <div id="void-app">
        <nav class="sidebar">
            <div class="brand">VOID</div>
            <div class="search-box">
                <input type="text" id="profile-search" placeholder="Search profiles..." onkeyup="handleSearch()">
            </div>
            <ul class="nav-links">
                <li onclick="switchView('timeline')">Timeline</li>
                <li onclick="toggleStalkMode()" id="stalk-btn">Stalk Mode: Off</li>
            </ul>
            <div id="active-user-badge"></div>
        </nav>

        <main class="content-area">
            <header>
                <h1 id="page-title">Timeline</h1>
                <button onclick="toggleTheme()">🌗</button>
            </header>
            
            <section class="composer">
                <textarea id="new-post-text" placeholder="Share a thought..."></textarea>
                <button onclick="executePost()">Post</button>
            </section>

            <section id="feed-root"></section>
        </main>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
