<!DOCTYPE html>
<html lang="en">
<head>
    <title>Void // Social</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <aside class="sidebar">
            <input type="text" id="search-bar" placeholder="Search profiles..." onkeyup="searchProfiles()">
            <div id="search-results"></div>
        </aside>

        <main>
            <section class="composer">
                <textarea id="post-input" placeholder="Share a thought..."></textarea>
                <button onclick="createPost()">Post to Void</button>
            </section>

            <div id="feed">
                </div>
        </main>

        <aside class="messages-panel">
            <h3>Direct Messages</h3>
            <div id="chat-box"></div>
            <input type="text" id="msg-input" placeholder="Type a message...">
            <button onclick="sendDM()">Send</button>
        </aside>
    </div>
</body>
</html>
