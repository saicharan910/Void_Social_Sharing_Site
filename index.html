<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="midnight-theme">
    <header class="app-header">
        <div class="header-content">
            <div class="logo" onclick="location.reload()">VOID</div>
            <div class="search-container">
                <input type="text" id="main-search" placeholder="Search profiles or thoughts..." onkeyup="handleSearch()">
            </div>
            <div class="header-actions">
                <button onclick="toggleTheme()" class="theme-toggle">🌗</button>
            </div>
        </div>
    </header>

    <div class="centered-container">
        <section class="opinion-box">
            <textarea id="opinion-input" placeholder="Share your perspective..."></textarea>
            <div class="opinion-footer">
                <div class="media-upload">
                    <input type="file" id="media-file" hidden onchange="previewMedia()">
                    <label for="media-file" class="upload-btn">Add Image</label>
                </div>
                <button class="post-btn" onclick="executePost()">Post to Void</button>
            </div>
        </section>

        <div id="feed-root"></div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-links">
            <button class="nav-icon" onclick="switchView('home')">Home</button>
            <button class="nav-icon" onclick="switchView('explore')">Explore</button>
            <div class="profile-nav" onclick="openMyProfile()">
                <img src="https://api.dicebear.com/7.x/initials/svg?seed=Charan" class="nav-avatar">
                <span>Profile</span>
            </div>
        </div>
    </nav>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
