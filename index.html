<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID — Signal over Noise</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="midnight">
    <header class="app-header">
        <div class="header-inner">
            <div class="logo" onclick="location.reload()">VOID</div>
            <div class="search-bar">
                <input type="text" id="global-search" placeholder="Search perspectives..." onkeyup="handleSearch()">
            </div>
        </div>
    </header>

    <main class="main-content">
        <section class="composer">
            <textarea id="post-text" placeholder="Share your perspective, Charan..."></textarea>
            <div class="composer-footer">
                <div class="media-input">
                    <input type="file" id="image-input" hidden onchange="handleImagePreview()">
                    <label for="image-input" class="action-label">Attach Perspective</label>
                </div>
                <button class="post-btn" onclick="submitPost()">Post to Void</button>
            </div>
        </section>

        <div id="feed-root"></div>
    </main>

    <nav class="bottom-nav">
        <div class="nav-container">
            <div class="nav-item" onclick="location.reload()">Home</div>
            <div class="nav-item" onclick="toggleStalk()">Stalk</div>
            <div class="profile-tab" onclick="openMyProfile()">
                <img src="https://api.dicebear.com/7.x/initials/svg?seed=Charan" class="avatar-sm">
                <span>My Space</span>
            </div>
        </div>
    </nav>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
